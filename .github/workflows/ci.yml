name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quick-test:
    name: Quick Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run quick tests
        run: ./gradlew quickTest

      - name: Run MCP diagnostic tests
        run: ./gradlew :mcp-diagnostic:test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quick-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Docker preflight
        run: docker info

      - name: Run integration tests
        run: ./gradlew integrationTest
