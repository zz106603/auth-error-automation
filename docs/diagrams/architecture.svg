<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Auth Error Operations Analytics architecture</title>
  <desc id="desc">Write path from external system through API, PostgreSQL outbox, RabbitMQ and consumer with retry and DLQ, plus diagnostic paths through Prometheus Grafana and MCP Claude.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#0f172a}.section{font:700 18px Arial,sans-serif;fill:#334155}.label{font:600 15px Arial,sans-serif;fill:#0f172a}.small{font:13px Arial,sans-serif;fill:#475569}.box{rx:12;ry:12;stroke-width:2}.core{fill:#eff6ff;stroke:#2563eb}.store{fill:#f0fdf4;stroke:#16a34a}.queue{fill:#fff7ed;stroke:#ea580c}.observe{fill:#faf5ff;stroke:#9333ea}.policy{fill:#f8fafc;stroke:#64748b}.line{fill:none;stroke:#334155;stroke-width:2;marker-end:url(#arrow)}.dash{fill:none;stroke:#64748b;stroke-width:2;stroke-dasharray:7 5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="40" y="45" class="title">Auth Error Operations Analytics</text>
  <text x="40" y="85" class="section">Write path — recoverable state first, at-least-once delivery</text>

  <rect x="40" y="120" width="150" height="70" class="box core"/><text x="115" y="150" text-anchor="middle" class="label">External system</text><text x="115" y="172" text-anchor="middle" class="small">auth failure event</text>
  <rect x="240" y="120" width="150" height="70" class="box core"/><text x="315" y="150" text-anchor="middle" class="label">Spring Boot API</text><text x="315" y="172" text-anchor="middle" class="small">taxonomy normalize</text>
  <rect x="440" y="105" width="210" height="100" class="box store"/><text x="545" y="140" text-anchor="middle" class="label">PostgreSQL</text><text x="545" y="163" text-anchor="middle" class="small">AuthError + Outbox</text><text x="545" y="184" text-anchor="middle" class="small">same transaction</text>
  <rect x="700" y="120" width="160" height="70" class="box queue"/><text x="780" y="150" text-anchor="middle" class="label">RabbitMQ</text><text x="780" y="172" text-anchor="middle" class="small">confirm / return</text>
  <rect x="910" y="120" width="160" height="70" class="box core"/><text x="990" y="150" text-anchor="middle" class="label">Consumer</text><text x="990" y="172" text-anchor="middle" class="small">idempotent ledger</text>
  <path d="M190 155 H240" class="line"/><path d="M390 155 H440" class="line"/><path d="M650 155 H700" class="line"/><path d="M860 155 H910" class="line"/>

  <rect x="700" y="245" width="160" height="70" class="box queue"/><text x="780" y="275" text-anchor="middle" class="label">TTL Retry queue</text><text x="780" y="297" text-anchor="middle" class="small">transient failure</text>
  <rect x="910" y="245" width="160" height="70" class="box queue"/><text x="990" y="275" text-anchor="middle" class="label">DLQ</text><text x="990" y="297" text-anchor="middle" class="small">poison / exhausted</text>
  <rect x="440" y="245" width="210" height="70" class="box store"/><text x="545" y="274" text-anchor="middle" class="label">Operations ledgers</text><text x="545" y="297" text-anchor="middle" class="small">processed / retry / dead letter</text>
  <path d="M990 190 V245" class="line"/><path d="M910 280 H860" class="line"/><path d="M700 280 H650" class="line"/><path d="M545 245 V205" class="line"/>

  <line x1="40" y1="355" x2="1160" y2="355" stroke="#cbd5e1" stroke-width="2"/>
  <text x="40" y="400" class="section">Diagnostic path — observation does not mutate the write path</text>
  <rect x="100" y="440" width="190" height="80" class="box observe"/><text x="195" y="472" text-anchor="middle" class="label">Prometheus</text><text x="195" y="495" text-anchor="middle" class="small">latency / backlog / queue</text>
  <rect x="350" y="440" width="190" height="80" class="box observe"/><text x="445" y="472" text-anchor="middle" class="label">Grafana</text><text x="445" y="495" text-anchor="middle" class="small">time-series diagnosis</text>
  <rect x="660" y="440" width="190" height="80" class="box observe"/><text x="755" y="472" text-anchor="middle" class="label">MCP server</text><text x="755" y="495" text-anchor="middle" class="small">read-only DB queries</text>
  <rect x="910" y="440" width="190" height="80" class="box observe"/><text x="1005" y="472" text-anchor="middle" class="label">Claude</text><text x="1005" y="495" text-anchor="middle" class="small">facts vs hypotheses</text>
  <path d="M290 480 H350" class="line"/><path d="M850 480 H910" class="line"/>
  <path d="M545 315 C545 390 755 370 755 440" class="dash"/><path d="M780 190 C780 350 195 350 195 440" class="dash"/>

  <rect x="350" y="585" width="500" height="75" class="box policy"/><text x="600" y="616" text-anchor="middle" class="label">Policy · SLI/SLO · Runbook</text><text x="600" y="640" text-anchor="middle" class="small">state rules · thresholds · next checks · prohibited actions</text>
  <path d="M445 520 C445 555 530 550 530 585" class="dash"/><path d="M1005 520 C1005 555 670 550 670 585" class="dash"/>
</svg>
